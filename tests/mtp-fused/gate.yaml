# tests/mtp-fused/gate.yaml
#
# Phase 36 / Phase 37 fused-chain quality gate thresholds.
# Read by scripts/test-fused-harness.sh.
#
# Phase 36's BINDING claim, recalibrated 2026-05-07: at deployed
# settings (LLAMA_MTP_FUSED=1 LLAMA_MTP_INLINE_KV=1
# LLAMA_MTP_CHAIN_MIN_PROB=0.5), the fused chain achieves effective
# output PARITY with per-step at d=3 on Quadro RTX 6000 sm_75.
# Parity, not beat. The dependency-bounded ceiling on this hardware
# is at unity, not above; further lift would require either tree
# drafting, smaller chain compute, or speculative dispatch — none
# of which are in the current schedule. The fused implementation's
# value is in optionality (lower verify-side overhead at long
# context, simpler integration with KV scheduling), not throughput.
#
# Three ratios reported per workload, all fused / per-step on the
# same model + sweep:
#   accept_d3_ratio          per-draft acceptance — quality
#   tg_d3_ratio              tokens-per-second   — throughput
#   effective_output_ratio   accept × tg         — useful tokens/s
#
# effective_output_ratio is the BINDING gate. accept and tg are
# advisory: they prevent a future change from trading off so far in
# either direction that the deployed config becomes unrepresentative.
#
# Run-to-run variance: spec-decode benchmarks on this hardware show
# ~5% variance per metric across back-to-back runs (sampling order,
# graph cache state, KV scheduling jitter). Thresholds set at parity
# minus 5% so a single run can pass cleanly; sustained regressions
# below the floor force a reopen.
#
# Phase 0 baseline (post seed-source + seed-copy + vocab fixes;
# observed 2026-05-07, deployed config):
#
#   workload          accept_d3   tg_d3      accept   tg     effective
#   --------          ---------   -----      ------   -----  ---------
#   fused fast (run1)              -         1.123   0.935   1.050
#   fused fast (run2)              -         1.109   0.900   0.998
#   fused slow (run1)              -         1.039   0.985   1.024
#
# Threshold rationale:
#   accept_d3_ratio >= 0.95  — fused must remain within 5% of per-step
#                              quality. Floor protects against regressions
#                              that would make fused an unprincipled
#                              quality tradeoff. Measurements at 1.10+.
#   tg_d3_ratio     >= 0.85  — fused can be up to 15% slower per-token
#                              than per-step (architectural cost of the
#                              chain compute past step 1). Measurements
#                              cluster around 0.90-0.99.
#   effective_output_ratio
#                   >= 0.95  — BINDING parity-with-noise floor: fused
#                              must deliver useful tokens per second
#                              within 5% of per-step. The dependency-
#                              bounded ceiling on this hardware is at
#                              unity; this floor protects against
#                              regression below the noise margin.
#                              Measurements cluster around 1.00.
#
# Phase 36 closes when --fast AND --slow both PASS at these thresholds.
# A regression below any threshold reopens. The thresholds are not
# knobs to relax for a "convenient close"; raise them only when a real
# perf improvement makes them comfortable.

fast:                            # synthetic prompt, ctx=4K (~3 min total)
  accept_d3_ratio:        0.95   # measured 1.10-1.12
  tg_d3_ratio:            0.85   # measured 0.90-0.94
  effective_output_ratio: 0.95   # BINDING: measured 1.00-1.05

slow:                            # X02 prompt, ctx=256K (~40 min total)
  accept_d3_ratio:        0.95   # measured 1.04
  tg_d3_ratio:            0.85   # measured 0.985
  effective_output_ratio: 0.95   # BINDING: measured 1.024
