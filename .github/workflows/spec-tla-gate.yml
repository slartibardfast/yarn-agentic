name: Spec / TLA synergy gate

# Runs every push and PR. Catches Allium ↔ TLA+ ↔ test-name drift.
# The negative-control runs make the gate strict: an invariant that no
# longer fires under its bug-injection flag means the invariant has been
# weakened — CI fails.

on:
  push:
    branches: [main, "production/**"]
  pull_request:

permissions:
  contents: read

jobs:
  spec-tla:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Java (for TLC) + Python
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq default-jre python3
          java -version
          python3 --version

      - name: Install Allium CLI
        run: |
          # Crate is `allium-cli`; pin to 3.0.5 to match local behavior.
          # Newer versions exit 1 on any diagnostic (info/warning); 3.0.5
          # exits 0 unless severity=error. Pin keeps spec/CI reproducible;
          # bump when the spec is also field/entity-clean against latest.
          curl -fsSL https://sh.rustup.rs | sh -s -- -y --profile minimal
          source "$HOME/.cargo/env"
          cargo install allium-cli --version 3.0.5 --quiet
          allium --version

      - name: Fetch TLC tools
        run: |
          mkdir -p .tla-tools
          curl -fsSL -o .tla-tools/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
          ls -la .tla-tools/

      - name: Allium syntax check
        run: |
          source "$HOME/.cargo/env"
          allium check specs/dflash/dflash.allium

      - name: Allium obligation ledger drift check
        run: |
          source "$HOME/.cargo/env"
          allium plan specs/dflash/dflash.allium > /tmp/obligations.json
          # The committed ledger must match what `allium plan` produces now.
          # Drift means someone edited the spec without regenerating.
          diff data/dflash_test_obligations.json /tmp/obligations.json

      - name: Binding integrity (Allium ↔ TLA ↔ C++)
        run: |
          source "$HOME/.cargo/env"
          # scripts/check-bindings.py enforces five independent checks:
          #   1. Forward — every Allium invariant bound in TLA or external
          #   2. Reverse — every TLA def is an invariant, helper, or divergence
          #   3. C++ test citations map to real Allium invariants
          #   4. Divergence entries are well-formed
          #   5. External-binding entries are well-formed
          # Exit code is the failure count.
          python3 scripts/check-bindings.py

      - name: TLC — DFlashCycle base (must PASS)
        run: |
          cd specs/dflash
          java -cp ../../.tla-tools/tla2tools.jar tlc2.TLC \
            -workers 4 -config DFlashCycle.cfg DFlashCycle.tla \
            > /tmp/tlc.log 2>&1
          if grep -qE "Error:" /tmp/tlc.log; then
            echo "TLC found an error on the BASE config:"
            grep -A2 "Error:" /tmp/tlc.log
            exit 1
          fi
          echo "DFlashCycle base PASSES — no errors."

      - name: TLC — DFlashCycle negative control RejectionDropped (must FAIL)
        run: |
          cd specs/dflash
          java -cp ../../.tla-tools/tla2tools.jar tlc2.TLC \
            -workers 4 -config DFlashCycle_RejectionDropped.cfg DFlashCycle.tla \
            > /tmp/tlc.log 2>&1 || true
          if ! grep -q "Invariant NumRejectedTokensFlowsBackToProposer is violated" /tmp/tlc.log; then
            echo "NEGATIVE CONTROL FAILED: expected 'NumRejectedTokensFlowsBackToProposer' violation, did not see it."
            echo "Either the invariant was weakened or the bug-injection no longer triggers it."
            tail -30 /tmp/tlc.log
            exit 1
          fi
          echo "Negative control RejectionDropped correctly falsifies NumRejectedTokensFlowsBackToProposer."

      - name: TLC — DFlashCycle negative control AnchorDrift (must FAIL)
        run: |
          cd specs/dflash
          java -cp ../../.tla-tools/tla2tools.jar tlc2.TLC \
            -workers 4 -config DFlashCycle_AnchorDrift.cfg DFlashCycle.tla \
            > /tmp/tlc.log 2>&1 || true
          if ! grep -q "Invariant AnchorPosPreserved is violated" /tmp/tlc.log; then
            echo "NEGATIVE CONTROL FAILED: expected 'AnchorPosPreserved' violation."
            tail -30 /tmp/tlc.log
            exit 1
          fi
          echo "Negative control AnchorDrift correctly falsifies AnchorPosPreserved."

      - name: TLC — DFlashMultiSlot base (must PASS)
        run: |
          cd specs/dflash
          java -cp ../../.tla-tools/tla2tools.jar tlc2.TLC \
            -workers 4 -config DFlashMultiSlot.cfg DFlashMultiSlot.tla \
            > /tmp/tlc.log 2>&1
          if grep -qE "Error:" /tmp/tlc.log; then
            echo "TLC found an error on the BASE multi-slot config:"
            grep -A2 "Error:" /tmp/tlc.log
            exit 1
          fi
          echo "DFlashMultiSlot base PASSES — no errors."

      - name: TLC — multi-slot SingleGridDispatch (must FAIL)
        run: |
          cd specs/dflash
          java -cp ../../.tla-tools/tla2tools.jar tlc2.TLC \
            -workers 4 -config DFlashMultiSlot_SingleGridDispatch.cfg DFlashMultiSlot.tla \
            > /tmp/tlc.log 2>&1 || true
          if ! grep -q "Invariant PerSlotVerifyDispatchAtMultiSlot is violated" /tmp/tlc.log; then
            echo "NEGATIVE CONTROL FAILED: expected 'PerSlotVerifyDispatchAtMultiSlot' violation."
            tail -30 /tmp/tlc.log
            exit 1
          fi
          echo "Negative control SingleGridDispatch correctly falsifies PerSlotVerifyDispatchAtMultiSlot."

      - name: TLC — multi-slot CrossSlotRace (must FAIL)
        run: |
          cd specs/dflash
          java -cp ../../.tla-tools/tla2tools.jar tlc2.TLC \
            -workers 4 -config DFlashMultiSlot_CrossSlotRace.cfg DFlashMultiSlot.tla \
            > /tmp/tlc.log 2>&1 || true
          if ! grep -q "Invariant NoCrossSlotRegionOverlap is violated" /tmp/tlc.log; then
            echo "NEGATIVE CONTROL FAILED: expected 'NoCrossSlotRegionOverlap' violation."
            tail -30 /tmp/tlc.log
            exit 1
          fi
          echo "Negative control CrossSlotRace correctly falsifies NoCrossSlotRegionOverlap."
