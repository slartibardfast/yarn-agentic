# /etc/systemd/system/llama-server.service.d/03-rt-deps.conf
#
# Drop-in adding RT-prep dependency to llama-server.service.
# Installed by scripts/systemd/llm-rt-tuning/install.sh.
#
# The llm-rt-prep.service handles CPU governor + IRQ affinity for the
# deterministic dispatch path (PHASE_NP8_FLAKE.md). We Want= it (soft
# dependency: llama-server still starts if prep fails) rather than
# Require= because a missing prep produces a deterministic-non-bit-
# identical service, not a broken one, and we prefer "serving but
# slightly racy" over "down" if the prep script ever has a bug.
[Unit]
Wants=llm-rt-prep.service
After=llm-rt-prep.service
