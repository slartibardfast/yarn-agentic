# /etc/systemd/system/llama-server.service.d/04-rt-flags.conf
#
# Capability + rlimit grants needed by the binary-level RT flags added
# to /home/llm/profiles/qwen36-27b-x1-vanilla.sh (PHASE_NP8_FLAKE §9.2):
#
#   --mlockall  needs   CAP_IPC_LOCK  (or unlimited RLIMIT_MEMLOCK)
#   --rt-prio N needs   CAP_SYS_NICE  (or RLIMIT_RTPRIO >= N)
#   --cpu-mask  needs   nothing
#
# NoNewPrivileges is already 'no' in the parent unit (verified
# 2026-05-27), so AmbientCapabilities takes effect. The user 'llm'
# inherits the listed caps for the duration of llama-server execution
# and only those — CapabilityBoundingSet still bounds them to the
# already-permitted set.

[Service]
AmbientCapabilities=CAP_IPC_LOCK CAP_SYS_NICE
LimitMEMLOCK=infinity
LimitRTPRIO=99
