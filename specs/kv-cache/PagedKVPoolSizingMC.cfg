\* T5.9 — Sibling TLC config for PagedKVAllocator that forces pool
\* exhaustion. Driver for the PoolBoundsRespected + PoolExhaustionRecorded
\* invariants added at T5.9.A.2.
\*
\* The base PagedKVAllocatorMC.cfg sizes the pool so it fits exactly
\* (NBlocks=4, two seqs × 2 blocks). This sibling under-sizes the
\* pool so OOB is mechanically reachable, ensuring the model
\* actually exercises the exhaustion path that T5.9 paged BACKING
\* makes user-visible (via HTTP 503 + Retry-After at the server
\* boundary; paged_kv_pool_sizing.allium::PoolExhaustionReturns503).
\*
\* Together this config + the new invariants bind the user-override
\* contract: pool exhaustion is a FIRST-CLASS state, not an edge
\* case (paged_block_allocator.allium::HighCtxFeasibility
\* ::OOMBehaviourIsFirstClass).

CONSTANTS
    Seqs = {s0, s1}
    NBlocks = 2
    BlockSizeTokens = 2
    MaxWritesPerSeq = 6
    MaxStep = 8

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

SYMMETRY SeqSymmetry

INVARIANTS
    TypeOK
    BlockUniquelyOwned
    FreeListDisjoint
    AllocLazy
    FreeOrOwned
    PoolBoundsRespected
    PoolExhaustionRecorded

PROPERTIES
    EventuallyWriteSucceedsUnlessFull
