\* T5.0 — TLC config for PagedKVByteIdentity. Both modes; trivial mapping
\* is the only block_table state in this model — confirms address formulae
\* are byte-equivalent at every (seq, k).

CONSTANTS
    NSeqs = 2
    Ne11PerSeq = 8
    BlockSizeTokens = 4
    KvpsPerStream = 8
    HeadDim = 64
    NHeadKv = 2
    Nb11 = 64

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    ByteIdentityAtTrivialMapping
    NoOutOfRangeAtTrivialMapping
    NoCrossSeqAliasingAtTrivialMapping
