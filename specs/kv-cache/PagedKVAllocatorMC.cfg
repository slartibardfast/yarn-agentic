\* T5.0 — TLC config for PagedKVAllocator. Bounded model exercising
\* fragmentation, OOM signal, and lazy alloc.

CONSTANTS
    Seqs = {s0, s1}
    NBlocks = 4
    BlockSizeTokens = 2
    MaxWritesPerSeq = 4
    MaxStep = 6

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

SYMMETRY SeqSymmetry

INVARIANTS
    TypeOK
    BlockUniquelyOwned
    FreeListDisjoint
    AllocLazy
    FreeOrOwned

PROPERTIES
    EventuallyWriteSucceedsUnlessFull
