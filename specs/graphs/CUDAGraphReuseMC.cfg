\* P0.B.S3 — TLC config for CUDAGraphReuse.tla — POSITIVE test.
\* All safety invariants should hold; EventualEviction (liveness) should
\* hold under WF on EvictHead + CaptureFresh.
\*
\* Dimensions kept small for tractable BFS. The structural invariants are
\* uniform in Topologies/Dtypes/MaxCacheEntries and are bound by the
\* action structure; larger dimensions only extend exploration time.

CONSTANTS
    Topologies = {t0, t1, t2}
    Dtypes = {f16, q4_0}
    MaxCacheEntries = 2
    MaxStep = 4

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    CacheBounded
    NoReuseAcrossDtypeChange
    ReuseImpliesPropertyMatch
    AddressToleranceScopedToViewCpy
    DispatchClearedAfterAction
    BoundedStep

PROPERTIES
    EventualEviction
