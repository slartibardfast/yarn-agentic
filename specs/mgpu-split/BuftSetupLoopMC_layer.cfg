\* PHASE46 B.0 spec #2 — TLC config for BuftSetupLoop.tla — LAYER mode.
\* Upstream-style per-layer pinning. Must establish: no split_buft,
\* every GPU layer has offload buft populated.

CONSTANTS
    NLayer     = 4
    NDevice    = 2
    IGpuStart  = 0
    SplitMode  = "LAYER"
    NGpuLayers = 4
    MainGpu    = 0

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    NoOrphanGpuLayersAtExit
    SplitBuftPresentAtExitIffRequired

PROPERTIES
    LoopTerminates
