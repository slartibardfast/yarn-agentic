\* PHASE46 B.0 spec #2 — TLC config for BuftSetupLoop.tla — NONE mode.
\* Single-GPU; no split_buft, every GPU layer assigned to MainGpu.

CONSTANTS
    NLayer     = 4
    NDevice    = 1
    IGpuStart  = 0
    SplitMode  = "NONE"
    Splits     = [d1 |-> 1]
    NGpuLayers = 4
    MainGpu    = 0

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    NoOrphanGpuLayersAtExit
    SplitBuftPresentAtExitIffRequired

PROPERTIES
    LoopTerminates
