\* PHASE46 B.0 spec #4 — TLC config for ClipCrossDeviceFlow.tla.
\* N_LAYERS = 3 small enough for tractable TLC, large enough to exercise
\* layer-(i-1) → layer-i → layer-(i+1) overlap (the saturation case at
\* the middle layer). Production ViT has N_LAYERS = 24–32; the
\* per-layer invariants asserted here generalize by structural induction.

CONSTANT N_LAYERS = 2

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    EncoderReadyAfterAllLayers
    LMConsumesAfterReady
    FullOverlapUnderSaturation

PROPERTIES
    SafetyConsumeAfterCompute
    SafetyEventOrdering
    LivenessAllLayersComplete
    EventuallyEncoderReady
    EventuallyLMConsumes
