\* PHASE46 B.0 spec #3 — TLC config for CreateSplitBalance.tla.
\* NDevice = 2 matches the Phase 46 production target (CUDA0+CUDA1).
\* NChunk = 4 small enough to keep state space tractable, large enough
\* to exercise both correction loops. MaxInitialSum = 6 forces the
\* down-loop to run for some initial allocations (up to 2 decrements)
\* AND permits initial allocations below NChunk that exercise up-loop.

CONSTANTS
    NDevice       = 2
    NChunk        = 4
    MaxInitialSum = 6

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    NonNegative
    SumTracks
    SumInvariantAtExit
    BoundedAtExit

PROPERTIES
    LoopTerminates
    DownTerminates
    UpTerminates
