\* PHASE46 B.0 spec #2 — TLC config for BuftSetupLoop.tla — GRAPH mode.
\* This is the production-LM case: --split-mode graph --tensor-split 1,1
\* on a 2-device CUDA0/CUDA1 host (the xeon prod host). At loop exit
\* model.split_buft must be SPLIT and every GPU layer must have both
\* slots of buft_layer populated.

CONSTANTS
    NLayer     = 4
    NDevice    = 2
    IGpuStart  = 0
    SplitMode  = "GRAPH"
    NGpuLayers = 4
    MainGpu    = 0

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    NoOrphanGpuLayersAtExit
    SplitBuftPresentAtExitIffRequired

PROPERTIES
    LoopTerminates
