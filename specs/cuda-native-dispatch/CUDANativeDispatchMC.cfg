\* Model-checking config for CUDANativeDispatchMC.tla.
\* Two backends, three splits, two dispatch iterations. See the MC module
\* for the split shape rationale.

SPECIFICATION Spec

CONSTANTS
    NBackends <- NBackends_def
    MaxIters  <- MaxIters_def
    Splits    <- Splits_def

\* Type invariant.
INVARIANT TypeOK

\* Load-bearing safety invariants from the spec docstring.
INVARIANT HostThreadIsExactlyOne
INVARIANT EvalsAreSequential
INVARIANT EventRecordedAfterEval
INVARIANT ReduceMarksAllParticipantsSticky
INVARIANT AllSplitsEnqueuedBeforeCapture
INVARIANT SingleGraphLaunch

\* The model is bounded by MaxIters; termination is by design, not deadlock.
CHECK_DEADLOCK FALSE
