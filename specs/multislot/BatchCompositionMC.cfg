\* S3 — TLC config for BatchComposition.tla — POSITIVE test.
\* DecodeHoldGateOn = TRUE (Bug C closure active). All invariants should hold.

CONSTANTS
    Slots = {s0, s1}
    MaxStep = 5
    MaxPromptLen = 3
    ChunkSize = 2
    DecodeHoldGateOn = TRUE

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    BatchCompositionInvariant
    MixedBatchProhibition
    AtMostOnePrefillSlotPerBatch
    DecodeHoldImpliedByPendingPrefill
    PrefillContinuationPriority
    PromptDoneBoundedByTotal
    SlotStateConsistency
    BoundedStep

\* Liveness (EventualProgress, PrefillEventuallyDrains) is intentionally
\* omitted from MC. Under finite-state model checking with a bounded
\* step_count, the system stutters at step_count = MaxStep and any
\* unstarted/unfinished prefill trivially violates liveness. Liveness
\* is verified structurally: Tick is enabled whenever there is prefill
\* or decode work; under WF_vars(Tick) + WF_vars(CompletePrefill) the
\* unbounded system makes progress.
