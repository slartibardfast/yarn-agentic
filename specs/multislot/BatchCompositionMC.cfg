\* T4 — TLC config for BatchComposition.tla — LEGACY regression test.
\* DecodeHoldGateOn = TRUE restores pre-T4 (Bug C closure-by-gates)
\* behaviour: at most one slot's prefill per tick, decodes held while
\* any slot is LOAD_PROMPT. The new T4 admission contracts
\* (BatchCompositionInvariant + TokenBudgetRespected) still hold under
\* this mode (legacy admission is a strict subset of T4 admission), so
\* all Legacy* invariants must also hold. This config catches model
\* refactors that accidentally break legacy semantics.

CONSTANTS
    Slots = {s0, s1}
    MaxStep = 5
    MaxPromptLen = 3
    MaxBudget = 4
    DecodeHoldGateOn = TRUE

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    BatchCompositionInvariant
    TokenBudgetRespected
    PerTokenFlagExclusivity
    ChunkedPrefillBoundedByRemaining
    LegacyMixedBatchProhibition
    LegacyAtMostOnePrefillSlotPerBatch
    LegacyDecodeHoldImpliedByPendingPrefill
    PromptDoneBoundedByTotal
    AdmissionSlotStateConsistency
    SlotStateConsistency
    BoundedStep

\* Liveness (EventualProgress, PrefillCarryProgresses) is intentionally
\* omitted from MC. Under finite-state model checking with a bounded
\* step_count, the system stutters at step_count = MaxStep and any
\* unstarted/unfinished prefill trivially violates liveness. Liveness
\* is verified structurally: Tick is enabled whenever there is prefill
\* or decode work; under WF_vars(Tick) + WF_vars(CompletePrefill) the
\* unbounded system makes progress.
