\* T4 — TLC config for BatchComposition.tla — PRIMARY POSITIVE test.
\* Tier 4 chunked-prefill admission: multiple LOAD_PROMPT slots may
\* contribute prefill chunks in the same tick as decode tokens from
\* PROCESSING slots, subject to the per-tick token budget K
\* (MaxBudget). All Tier 4 invariants must hold.

CONSTANTS
    Slots = {s0, s1}
    MaxStep = 5
    MaxPromptLen = 3
    MaxBudget = 4

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    BatchCompositionInvariant
    TokenBudgetRespected
    PerTokenFlagExclusivity
    DecodePriorityAdmission
    ChunkedPrefillBoundedByRemaining
    PromptDoneBoundedByTotal
    AdmissionSlotStateConsistency
    SlotStateConsistency
    BoundedStep

\* Liveness (EventualProgress, PrefillCarryProgresses) is intentionally
\* omitted from MC. Under finite-state model checking with a bounded
\* step_count, the system stutters at step_count = MaxStep and any
\* unstarted/unfinished prefill trivially violates liveness. Liveness
\* is verified structurally: Tick is enabled whenever there is prefill
\* or decode work; under WF_vars(Tick) + WF_vars(CompletePrefill) the
\* unbounded system makes progress.
