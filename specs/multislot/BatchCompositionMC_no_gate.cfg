\* T4 — TLC config for BatchComposition.tla — NEGATIVE test.
\* DecodeHoldGateOn = FALSE puts the model in Tier 4 admission mode.
\* Under T4, the legacy contracts (MixedBatchProhibition / AtMostOne
\* prefill slot / DecodeHold) DO NOT hold — mixed batches with multiple
\* prefill slots are explicitly allowed. This config asserts the legacy
\* Legacy* invariants and expects them to VIOLATE. This is the "spec
\* binds" check: removing the legacy gate AND running the legacy
\* invariants must produce a counterexample matching the T4 admission
\* signature (e.g., a tick with both prefill_count > 0 for some slot
\* and batch_decodes # {}).

CONSTANTS
    Slots = {s0, s1}
    MaxStep = 5
    MaxPromptLen = 3
    MaxBudget = 4
    DecodeHoldGateOn = FALSE

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    BatchCompositionInvariant
    TokenBudgetRespected
    PerTokenFlagExclusivity
    ChunkedPrefillBoundedByRemaining
    LegacyMixedBatchProhibition
    LegacyAtMostOnePrefillSlotPerBatch
    LegacyDecodeHoldImpliedByPendingPrefill
    PromptDoneBoundedByTotal
    AdmissionSlotStateConsistency
    SlotStateConsistency
    BoundedStep

\* No liveness checks in the negative-test config — we want a fast
\* counterexample on safety, not a deeper liveness search.
\*
\* Expected: LegacyMixedBatchProhibition (or
\* LegacyAtMostOnePrefillSlotPerBatch / LegacyDecodeHoldImplied…) VIOLATE
\* — the model reaches a state where a prefill chunk AND a decode token
\* are in the same Tick's batch, demonstrating the Tier 4 admission
\* explicitly produces what the legacy spec used to forbid.
