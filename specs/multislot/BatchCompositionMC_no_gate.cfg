\* T4 — TLC config for BatchComposition.tla — NEGATIVE test.
\* Asserts the Legacy* invariants (pre-T4 batch composition rules) under
\* the T4 admission model. Tier 4 admission EXPLICITLY produces what
\* legacy admission forbade (mixed batches, multi-slot prefill in one
\* tick, decode admitted alongside pending prefill). This config
\* expects a TLC VIOLATION on one of the Legacy* invariants — the
\* counterexample trace demonstrates that the spec binds (T4 mode
\* reaches states the legacy spec used to declare unreachable).

CONSTANTS
    Slots = {s0, s1}
    MaxStep = 5
    MaxPromptLen = 3
    MaxBudget = 4

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    BatchCompositionInvariant
    TokenBudgetRespected
    PerTokenFlagExclusivity
    ChunkedPrefillBoundedByRemaining
    LegacyMixedBatchProhibition
    LegacyAtMostOnePrefillSlotPerBatch
    LegacyDecodeHoldImpliedByPendingPrefill
    PromptDoneBoundedByTotal
    AdmissionSlotStateConsistency
    SlotStateConsistency
    BoundedStep

\* Expected: LegacyMixedBatchProhibition (or
\* LegacyAtMostOnePrefillSlotPerBatch / LegacyDecodeHoldImplied…) VIOLATE
\* — the T4 model reaches a state where a prefill chunk AND a decode
\* token are in the same Tick's batch, demonstrating the T4 admission
\* explicitly produces what the legacy spec used to forbid.
