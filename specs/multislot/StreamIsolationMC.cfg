\* S3 — TLC config for StreamIsolation.tla — POSITIVE test.
\* PerStreamDispatchOn = TRUE (4D port active). All invariants should hold.

\* Dimensions kept small for tractable BFS — the structural invariants
\* (StreamPartition, NoCrossStreamLeakage, DispatchUnitUniformity,
\* MixedBatchProhibitionByConstruction, MaskCorrectness) are uniform in
\* Streams/StreamSize and are bound by the action structure, not by
\* exploration depth. Larger dimensions extend exploration time
\* exponentially without revealing new state classes.
CONSTANTS
    Streams = {st0, st1}
    StreamSize = 2
    MaxStep = 3
    MaxTokensPerTick = 2
    PerStreamDispatchOn = TRUE

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    StreamPartition
    NoCrossStreamLeakage
    DispatchUnitUniformity
    MixedBatchProhibitionByConstruction
    VHeadBounded
    VHeadMatchesOccupancy
    MaskCorrectness
    BoundedStep
