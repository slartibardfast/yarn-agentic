\* Model-checking config for AsyncReduce.tla — base configuration.
\* Two devices (the TU102 pair), 2 layers (smallest non-trivial scope
\* that exercises StartFFN(d, l+1) firing while comm_state[d, l] is in
\* flight — the overlap property).

SPECIFICATION Spec

CONSTANTS
    N_LAYERS = 2

\* Type invariant — a pure state predicate.
INVARIANT TypeOK

\* The remaining safety and liveness predicates carry their own
\* temporal operators ([] or <>) and must be declared as PROPERTY.
PROPERTY SafetyConsumeAfterCompute
PROPERTY SafetyEventOrdering
PROPERTY LivenessAllLayersComplete
PROPERTY LivenessAllReducesSignal

\* Final-state silence is the expected outcome: all (device, layer)
\* pairs reach DONE and no further action is enabled. Disable TLC's
\* default deadlock check.
CHECK_DEADLOCK FALSE
