\* TLC config for the outlier-prompt case: FA at all earlier FA layers
\* (3, 7, 11, 15) is byte-identical, but at layer 19 sub-fp32-epsilon
\* drift is introduced and then MMQ at layer 19's FFN amplifies it to
\* fp16-visible. Models p0 at NP=2 vs NP=4.

CONSTANTS
    NLayers = 20
    NPa = 2
    NPb = 4
    FA_LayerIndices = {3, 7, 11, 15, 19}
    FA_ShapeSensitive = {}
    MMQ_AmplifiesNoise = {19}
    InitialDriftLevel = "sub_fp32_eps"
    \* sub_fp32_eps at pc=0 captures the empirical state at p0 layer 19's
    \* entry: upstream of layer 19, sub-fp32-eps drift has been introduced
    \* by FA-stable but FP-imperfect kernels. The MMQ at layer 19's FFN
    \* then amplifies this to fp16_visible.

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    ByteIdentityAtEnd_FailsIfFAShapeSensitiveOrMMQAmplifies

\* Properties bound externally — see allium-tla-binding.json
\* WmmaFAByteIdenticalAtOtherInputs (TRUE by Spec — empirical, not state-machine)
\* MmqShapeSensitiveViaAmplification (TRUE by Spec)
