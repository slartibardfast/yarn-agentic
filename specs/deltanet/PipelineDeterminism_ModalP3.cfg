\* TLC config for the modal-prompt case: FA at the FIRST FA layer (3) is
\* shape-sensitive; drift visible from layer 3 onward. Models p1, p3 (and
\* anticipated p2, p4, p5) at NP=2 vs NP=4. No MMQ amplification needed.

CONSTANTS
    NLayers = 16
    NPa = 2
    NPb = 4
    FA_LayerIndices = {3, 7, 11, 15}
    FA_ShapeSensitive = {3}
    MMQ_AmplifiesNoise = {}
    InitialDriftLevel = "byte_identical"

SPECIFICATION Spec

\* Pipeline completes when pc = NLayers; the model has no terminal action by
\* design (the pipeline's purpose is to compute all layers, not to loop).
\* Disable deadlock check.
CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    ByteIdentityAtEnd_FailsIfFAShapeSensitiveOrMMQAmplifies

\* Properties bound externally — see allium-tla-binding.json
\* WmmaFAShapeSensitiveAtSomeInputs (TRUE by Spec)
\* DriftCascadeAfterFirstDivergence (action property)
