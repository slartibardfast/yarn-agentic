\* P0.B.S3 — TLC config for MTPxNStream.tla — HEAD config.
\* PerStreamChainExtended = FALSE. Models the structural opt-out at
\* multi-slot batched dispatch: the chain-residual arm cannot fire
\* when n_active_streams > 1.

CONSTANTS
    Streams = {st0, st1}
    MaxStep = 4
    PerStreamChainExtended = FALSE

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    NoCrossStreamChainPoisoning
    MultiSlotImpliesSkippedArm
    SingleSlotPathHonoursArm
    ArmedImpliesActive
    BoundedStep
