\* TLC config for CbEvalObservational.tla — NEGATIVE test.
\* Mechanism = SCHEDULER_CALLBACK — the broken P0.A.3 implementation.
\* ObservationalEquivalence MUST be violated reachably: ArmExtract installs
\* the callback, Decode then emits PerturbedToken on the test context while
\* the base context emits BaselineToken, breaking equality.
\*
\* This is the "spec binds" check: removing the architectural constraint
\* (using cb_eval instead of tap nodes) produces a counterexample that
\* matches the empirical P0.A.3 garbled output.

CONSTANTS
    Prompts = {p0, p1}
    BaselineToken = "baseline"
    PerturbedToken = "perturbed"
    MaxStep = 5
    Mechanism = "SCHEDULER_CALLBACK"

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    ObservationalEquivalence
    SchedulerStaysFastPath
