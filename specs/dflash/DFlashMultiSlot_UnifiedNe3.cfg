\* DFlashMultiSlot_UnifiedNe3.cfg — Tier 3 verify-side unification.
\* DispatchMode = "UnifiedNe3" (Tier 3 contract).
\* All invariants should HOLD — including the new
\* Tier3VerifySideRespectsPerStreamPartition.

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Slots                    = { "s1", "s2" }
    MaxStep                  = 2
    BlockSize                = 2
    DispatchMode             = "UnifiedNe3"
    CrossSlotRegionOverlap   = FALSE

INVARIANTS
    TypeOK
    BoundedStep
    PerSlotVerifyDispatchAtMultiSlot
    NoCrossSlotRegionOverlap
    Tier3VerifySideRespectsPerStreamPartition
    SyncBeforeStepAdvance
    NAcceptedWithinBound
    NumRejectedTokensFlowsBackToProposer
    TargetKVAdvancesByAcceptedPlusBonus
